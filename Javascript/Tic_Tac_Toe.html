<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIC TAC TOE</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            background-color: #1D201F;
            text-align: center;
        }
        .container{
            height: 70vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .game{
            height: 60vmin; /* 60% milega container ka */
            width: 60vmin;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 1.5vmin;
        }
        .box{
            height: 18vmin;
            width: 18vmin;
            border-radius: 25px;
            border: none;
            box-shadow: 0 0 1rem rgba(0,0,0,0.05);
            font-size: 8vmin;
            color: #FF5400;
            cursor: pointer;
            background-color: #D1DEDE;
        }
        #reset-btn{
            padding: 1rem;
            font-size: 1.25rem;
            background-color: #FF5400;
            color: white;
            border-radius: 1rem;
            border: none;
            cursor: pointer;
        }
        .msg-container{
            font-size: 6vmin;
            color: #FFBD00;
            background-color: #FF0054;
        }
        .hide{
            display: none;
        }
    </style>
</head>
<body>
    <main>
        <h1 style="color: white;">Tic Tac Toe</h1>
        <div class="container">
            <div class="game">
                <button class="box"></button>
                <button class="box"></button>
                <button class="box"></button>
                <button class="box"></button>
                <button class="box"></button>
                <button class="box"></button>
                <button class="box"></button>
                <button class="box"></button>
                <button class="box"></button>
            </div>
        </div>
        <button id="reset-btn">Reset Game</button><br><br>
        <div class="msg-container hide">
            <p id="msg">Winner</p>
        </div>
    </main>
<script>
    let boxes = document.querySelectorAll(".box");
    let resetBtn = document.querySelector("#reset-btn");
    let mssg = document.querySelector("#msg");
    let msgBox = document.querySelector(".msg-container");

    let turnO = true;

    const winPatterns = [
        [0,1,2],
        [0,3,6],
        [0,4,8],
        [1,4,7],
        [2,5,8],
        [2,4,6],
        [3,4,5],
        [6,7,8],
    ];

    boxes.forEach((box) => {
        box.addEventListener("click" , () => {
            console.log("box was clicked");
            if(turnO){//player0
                box.innerText = "O";
                turnO = false;
            }
            else{//playerX
                box.innerText = "X";
                turnO = true;
            }
            box.disabled = true; /* IMPORTANT*/
            checkWinner();
        });
    });

    const checkWinner = () => {
        for(let pattern of winPatterns){
            let pos1Val = boxes[pattern[0]].innerText;
            let pos2Val = boxes[pattern[1]].innerText;
            let pos3Val = boxes[pattern[2]].innerText;

            if(pos1Val != "" && pos2Val != "" && pos3Val != ""){
                if(pos1Val === pos2Val && pos2Val === pos3Val){
                    console.log("Winner");
                    showWinner(pos1Val);
                }
            }
        }
    };

    const showWinner = (winner) => {
        mssg.innerText = `Winner is ${winner}`;
        msgBox.classList.remove("hide");
        disableBoxes();
    }

    const disableBoxes = () => {
        for(let box of boxes){
            box.disabled = true;    
        }
    }

    const resetGame = () => {
        turnO = true;
        enableBoxes();
        msgBox.classList.add("hide");
    };

    const enableBoxes = () => {
        for(let box of boxes){
            box.disabled = false;
            box.innerText = "";
        }
    }

    resetBtn.addEventListener("click" , resetGame);

</script>
</body>
</html>
