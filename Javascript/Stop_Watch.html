<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stop Watch</title>
    <style>
        *{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        .parent{
            height: 100vh;
            width: 100%;
            background-color: grey;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .buttons{
            height: 35vh;
            width: 30vw;
            display: grid;
            grid-template-columns: 5fr 5fr;
            padding: 1rem;
            align-items: center;
            justify-content: center;
            & button{
                height: 3rem;
                width: 10rem;
                border-radius: 1rem;
                font-size: 1rem;
            }
        }
        button:hover{
            background-color: yellowgreen;
            cursor: pointer;
        }
        #countDown{
            font-size: 5rem;
            color: yellow;
        }
        .resetValue p{
            font-size: 2rem;
            color: goldenrod;
        }
    </style>
</head>
<body>
    <div class="parent">
        <p id="countDown">0</p>
        <div class="buttons">
            <button class="startBtn">Start</button>
            <button class="resetBtn">Reset</button>
            <button class="stopBtn">Stop</button>
            <button class="timeBtn">getTime</button>
            <button class="clearBtn">clearTime</button>
        </div>
        <div class="resetValue"></div>
    </div>
<script>
    const countDownElement = document.querySelector("#countDown");
    const resetValueElement = document.querySelector(".resetValue");
    let startCount = 0;
    let intervalID;

    const startTimer = () => {
        intervalID = setInterval(() => {
            countDownElement.innerText = startCount++;
        } , 1000);
    };

    const stopTimer = () => {
        clearInterval(intervalID);
    };

    const resetTimer = () => {
        countDownElement.innerText = "0";
        startCount = 0;
        clearInterval(intervalID);
    };

    const showStopValue = () => {
        let showTime = document.createElement("p");
        showTime.innerText = `Time stopped at: ${startCount - 1}`;
        resetValueElement.append(showTime);
    };

    const clearTimeValue = () => {
        resetValueElement.innerHTML = "";
    };

    document.querySelector(".startBtn")
    .addEventListener("click" , startTimer);

    document.querySelector(".stopBtn")
    .addEventListener("click" , stopTimer);

    document.querySelector(".resetBtn")
    .addEventListener("click" , resetTimer);

    document.querySelector(".timeBtn")
    .addEventListener("click" , showStopValue);

    document.querySelector(".clearBtn")
    .addEventListener("click" , clearTimeValue);
</script>
</body>
</html>
