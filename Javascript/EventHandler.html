<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Handler</title>
    <style>
        body{
            background-color: black;
        }
        h1{
            color: white;
        }
        button{
            border-radius: 25px;
            background-color: gold;
            height: 40px;
            font-size: large;
            font-weight: 530;
            margin-right: 10px;
        }
    </style>
</head>
<body>
    <h1>Inline Event</h1>
    <div>
        <button onclick="alert('Welcome')">Greetings</button>
        <button ondblclick="alert('Let`s Go')">Greetings again</button>
        <button onmouseover="alert('Assemble')">greeting</button>
    </div>
    <h1>DOM Event Handler</h1>
    <div>
        <button id="myBtn">Greeting</button>
        <button id="myBtn1">Greeting again</button>
    </div>
    <h1>addEventListener Event Handler</h1>
    <div>
        <button id="myBtn2">Greeting</button>
        <button>greeting again</button>
    </div>
    <br><br>
    <a href="Loader.html">
        <button>Click me!!</button>
    </a>
</body>
<script>// different ways of event declaration
    document.getElementById("myBtn").onclick = () => {
        alert("Sic Mundus Creatus Est");
    }

    document.getElementById("myBtn1").ondblclick = function () {
        alert("Heisenberg");
    }

    // add event listener
    document.getElementById("myBtn2").addEventListener("click", function () {
        alert("Valhalla");
    })
</script>
</html>
