<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Watch</title>
    <style>
        *{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        body{
            height: 100vh;
            width: 100%;
            background-color: black;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .mainDiv{
            height: 12rem;
            width: 40rem;
            border: 0.3rem solid yellowgreen;
            border-radius: 1rem;
            font-size: 4rem;
            color: white;
            padding: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: rgba(154, 205, 50, 0.3) 0px 19px 38px, rgba(154, 205, 50, 0.22) 0px 15px 12px;
        }
    </style>
</head>
<body>
    <div class="mainDiv">
        <p id="clock">ww</p>
    </div>
<script>
    let time = document.querySelector("#clock");

    const currentTime = () => {
        let currTime = new Date().toLocaleTimeString();
        time.innerText = currTime;
    };

    currentTime();

    setInterval(() =>{
        currentTime();
    } , 1000);
</script>
</body>
</html>
