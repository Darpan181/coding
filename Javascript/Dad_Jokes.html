<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dad Jokes</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Urbanist" , sans-serif;
        }
        html{
            color: aliceblue;
            font-size: 62.5%;
        }
        body{
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: black;
        }
        .container{
            background-color: whitesmoke;
            text-align: center;
            padding: 2.4rem 6.4rem;
            border-radius: 0.6rem;
            color: black;
            min-width: 32rem;
        }
        .api_body{
            font-size: 1.7rem;
            letter-spacing: 0.1rem;
            margin-bottom: 2rem;
            margin-top: 1rem;
        }
        button{
            height: 5rem;
        }
        h1{
            font-size: 3.6rem;
        }
        p , li , button{
            font-size: 1.7rem;
            letter-spacing: 0.1rem;
            line-height: 1.6;
        }
        button{
            background-color: yellowgreen;
            padding: 0.6rem 2.4rem;
            border-radius: 10rem;
            margin-right: 3.6rem;
            cursor: pointer;
            transition: all 0.3s linear;

            &:hover{
                background-color: transparent;
                color: yellowgreen;
                font-weight: 600;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome! to Dad Jokes</h1>
        <section class="api_body"></section>
        <button id="fetchJoke">Get Another Joke</button>
    </div>
<script>
    const apiBody = document.querySelector(".api_body");
    const apiUrl = "https://icanhazdadjoke.com/";

    const fetchData = () => {
        fetch(apiUrl , {
            headers: {
                Accept: "application/json"
            }
        })
        .then((res) => {
            console.log(res);
            return res.json();
        })
        .then((data) => {
            console.log(data.joke);
            apiBody.innerHTML = data.joke;
        })
        .catch((error) => {
            console.log(error);
        });
    };

    document.querySelector("#fetchJoke").addEventListener("click" , fetchData);
</script>
</body>
</html>
