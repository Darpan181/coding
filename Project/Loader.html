<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loader</title>
    <style>
        *{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        html{
            font-size: 62.5%;
        }
        body{
            height: 100vh;
            display: grid;
            place-items: center;
            background-color: rgb(81, 4, 154);
        }
        .load{
            height: 20rem;
            width: 20rem;
            border-radius: 50%;
            background-color: white;
            position: relative;
            animation: loader 1s linear infinite;
        }
        .load::after{
            content: "";
            height: 18rem;
            width: 18rem;
            border-radius: 50%;
            background-color: rgb(81, 4, 154);
            position: absolute;
            top: 0%;
            bottom: 0%;
        }
        .load::before{
            content: "";
            position: absolute;
            height: 5rem;
            width: 5rem;
            border-radius: 50%;
            background-color: white;
            box-shadow: 0 0 1rem white, 0 0 1.5rem white, 0 0 2rem white, 0 0 2.5rem white, 0 0 3rem white;
            top: -10%;
            left: 35%;
            z-index: 1;
        }
        @keyframes loader{
            0%{
                rotate: 0deg;
            }
            100%{
                rotate: -360deg;
            }
        }
    </style>
</head>
<body>
    <div class="load"></div>
</body>
</html>
