<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cradle</title>
    <style>
        *{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        html{
            font-size: 62.5%;
        }
        body{
            height:100vh;
            display: grid;
            place-items: center;
            background-color: #66FF00;
            background-image: linear-gradient(to right, #66FF00, green);
        }
        .bar{
            height: 50rem;
            width: 50rem;
            background-color: transparent;
            border-radius: 10px;
            border-top: 15px solid #4B5320;
            display: flex;
            justify-content: space-evenly;
        }
        div{
            width: 1rem;
            height: 30rem;
            background-color: #4B5320;
            position: relative;
        }
        .bar div::after{
            content: "";
            position: absolute;
            width: 8.6rem;
            aspect-ratio: 1;
            border-radius: 50%;
            background-color: #4B5320;
            top: 99%;
            right: -370%;
        }
        .bar div:first-child{
            animation: left-swing 2s linear infinite;
            transform-origin: top left;
        }
        @keyframes left-swing{
            0%{
                rotate: 0deg;
            }
            25%{
                rotate: 30deg;
            }
            50%{
                rotate: 0deg;
            }
            100%{
                rotate: 0deg;
            }
        }
        .bar div:last-child{
            animation: right-swing 2s linear 1s/*DELAY*/ infinite;
            transform-origin: top right;
        }
        @keyframes right-swing{
            0%{
                rotate: 0deg;
            }
            25%{
                rotate: -30deg;
            }
            50%{
                rotate: 0deg;
            }
            100%{
                rotate: 0deg;
            }
        }
    </style>
</head>
<body>
    <div class="bar">
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
    </div>
</body>
</html>
