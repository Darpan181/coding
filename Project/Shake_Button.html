<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shake Button</title>
    <style>
        *{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        html{
            font-size: 62.5%;
        }
        body{
            height: 100vh;
            display: grid;
            place-items: center;
            background-color: #002D62;
        }
        .shake{
            width: 60vw;
            height: 25rem;
            background-color: transparent;
            text-align: center;
            border: 15px solid red;
            border-radius: 15%;
            padding: 30px 36px;
            font-size: 120px;
            color: red;
        }
        .shake:hover{
            border: 15px solid #F9629F;
            color: #F9629F;
            animation: shaky 0.1s linear infinite alternate;
            transform-origin: center;
        }
        @keyframes shaky{
            0%{
                rotate: 20deg;
            }
            50%{
                rotate: 0deg;
            }
            100%{
                rotate: -20deg;
            }
        }
    </style>
</head>
<body>
    <div class="shake">Shake Me</div>
</body>
</html>
