<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Html Form</title>
</head>
<body>
    <h1>HTML FORM</h1>
    <form>
        <label for="username">UserName</label>
        <input type="text" id="username"><br><br>

        <label for="email">E-mail</label>
        <input type="email" id="email"><br><br>

        <label for="txtarea">Description</label><br>
        <textarea name="" id="" cols="30" rows="10"></textarea><br><br>

        <label for="sbj">Max. Subject</label>
        <input type="number" id="sbj" value="0" max="6" min="2"><br><br>

        <label for="gender">Gender</label>
        <input type="radio" id="gender" name="gndr">Male <!-- " Name " se ek select hota hai -->
        <input type="radio" id="gender" name="gndr">Female <br><br>

        <label for="hobby">Fav. Hobbies</label>
        <input type="checkbox" name="hbby" value="music">Music
        <input type="checkbox" name="hbby" value="sport">Sports <br><br>

        <label for="cntry">Country</label>
        <select name="country" id="cntry">
            <option value="india">India</option>
            <option value="russia">Russia</option>
            <option value="japan">Japan</option>
            <option value="france">France</option>
            <option value="morocco">Morocco</option>
        </select><br><br>

        <input type="submit" value="Submit">
    </form>
</body>
